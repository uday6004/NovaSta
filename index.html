<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStat | System Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>NovaStat Stability Monitor</h1>
            <span class="status-badge">Steady-State Active</span>
        </header>
        
        <main class="grid-container">
            <div class="card tall">
                <h3>Auto-Scaling Thresholds</h3>
                <div class="chart-placeholder">72% Load</div>
                <p>Current Instance Count: 4</p>
            </div>
            <div class="card">
                <h3>Uptime</h3>
                <h2 class="stat">99.98%</h2>
            </div>
            <div class="card">
                <h3>UI Feedback Loop</h3>
                <p>3 Issues Resolved Today</p>
            </div>
            <div class="card wide">
                <h3>Disaster Recovery Status</h3>
                <div class="progress-bar"><div class="fill"></div></div>
                <p>Documentation 100% Complete</p>
            </div>
        </main>
    </div>
</body>
</html>
